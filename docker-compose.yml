services:
  postgres:
    image: postgres:16
    container_name: communitymap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-communitymap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-communitymap}
      POSTGRES_DB: ${POSTGRES_DB:-communitymap}
    ports:
      - "5433:5432"
    volumes:
      - communitymap_postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

volumes:
  communitymap_postgres_data:
